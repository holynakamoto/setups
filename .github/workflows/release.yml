name: Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: aarch64-apple-darwin
            runner: macos-14
          - target: x86_64-apple-darwin
            runner: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust target
        run: rustup target add ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package tarball
        run: |
          tar -czf setups-${{ matrix.target }}.tar.gz \
            -C target/${{ matrix.target }}/release setups

      - name: Compute SHA256
        run: |
          shasum -a 256 setups-${{ matrix.target }}.tar.gz \
            | awk '{print $1}' > setups-${{ matrix.target }}.sha256

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.target }}
          path: |
            setups-${{ matrix.target }}.tar.gz
            setups-${{ matrix.target }}.sha256

  publish:
    name: Publish release
    needs: [build]
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Read checksums
        run: |
          AARCH64_SHA=$(cat artifacts/aarch64-apple-darwin/setups-aarch64-apple-darwin.sha256)
          X86_64_SHA=$(cat artifacts/x86_64-apple-darwin/setups-x86_64-apple-darwin.sha256)
          echo "AARCH64_SHA=$AARCH64_SHA" >> "$GITHUB_ENV"
          echo "X86_64_SHA=$X86_64_SHA" >> "$GITHUB_ENV"

      - name: Commit updated formula
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase origin master
          sed -i '' "s/PLACEHOLDER_SHA256_AARCH64/$AARCH64_SHA/g" Formula/setups.rb
          sed -i '' "s/PLACEHOLDER_SHA256_X86_64/$X86_64_SHA/g" Formula/setups.rb
          git add Formula/setups.rb
          git commit -m "chore: bump formula checksums for ${{ github.ref_name }}"
          git push origin master

      - name: Create GitHub Release
        run: |
          gh release create ${{ github.ref_name }} \
            --title "${{ github.ref_name }}" \
            --generate-notes \
            artifacts/aarch64-apple-darwin/setups-aarch64-apple-darwin.tar.gz \
            artifacts/x86_64-apple-darwin/setups-x86_64-apple-darwin.tar.gz
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
